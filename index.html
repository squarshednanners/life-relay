        <h1>Life Relay — Free Estate Planning, Legacy &amp; Inheritance Organizer</h1>
        <p>Life Relay is a free, privacy-first web app for organizing your will, trust, legacy, and the critical information your family would need after your death or incapacity. Your own in-case-of-death folder and family emergency binder — entirely in your browser with no servers, no accounts, no tracking.</p>

        <h2>What You Can Organize</h2>
        <p>26 sections across 8 categories: People &amp; Contacts, Security &amp; Access, Insurance/Medical/Benefits, Finances, Digital &amp; Crypto Assets, Property &amp; Household, Documents &amp; Storage, and Final Wishes. Works as an important documents organizer for inheritance planning.</p>

        <h2>Key Features</h2>
        <ul>
          <li><strong>100% Private</strong> — All data stored locally in your browser. No servers, no cloud, no tracking.</li>
          <li><strong>Encrypted Exports</strong> — AES-256 password-protected JSON backups for USB drives or safes.</li>
          <li><strong>PDF Generation</strong> — Full vault PDF, one-page emergency information card, and attorney preparation summary. Print your own family emergency binder.</li>
          <li><strong>Estate Planning Guide</strong> — Checklist for inheritance planning and preparing to meet with an attorney about wills and trusts.</li>
          <li><strong>Crypto Recovery Plan</strong> — Hardware wallets, seed phrases, exchanges, multisig configs, and heir recovery instructions for digital inheritance.</li>
          <li><strong>Digital Inheritance</strong> — Document online accounts, cloud storage, social media, and digital purchases.</li>
          <li><strong>Works Offline</strong> — Installable as a Progressive Web App.</li>
          <li><strong>Free &amp; Open Source</strong> — MIT license. No subscriptions, no premium tiers.</li>
        </ul>

        <h2>Who It's For</h2>
        <ul>
          <li>Anyone preparing a will or trust who needs to organize their information first.</li>
          <li>Crypto holders documenting wallet recovery procedures for heirs.</li>
          <li>Parents organizing accounts, insurance, guardianship, and beneficiaries.</li>
          <li>Estate planners preparing for attorney meetings.</li>
        </ul>

        <p><strong>JavaScript is required to use Life Relay.</strong> Please enable JavaScript in your browser to get started.</p>
        <p>Source code: <a href="https://github.com/squarshednanners/life-relay">github.com/squarshednanners/life-relay</a></p>
